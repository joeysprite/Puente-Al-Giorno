<style>

  :root{
    color-scheme:light;
    --ink:#1C1B1A; --ink-2:#4C4A47; --ink-3:#605D59;
    --paper:#FAF6EE; --card:#FFFFFF; --rule:#E2D9C8;
    --es:#8C2F39; --it:#3D5A45; --ok:#3D5A45; --okbg:#E9F0EA; --badbg:#F6E7E4;
    --serif:'Newsreader',Georgia,serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;
       padding:2.5rem 1rem 5rem;-webkit-font-smoothing:antialiased}

  header{text-align:center;margin-bottom:1.6rem}

           text-transform:uppercase;color:var(--ink-3)}

     letter-spacing:-.01em;margin:.6rem 0 .4rem}
  .sub{color:var(--ink-2);font-size:.93rem;max-width:32rem;margin:0 auto}

  .modes{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin:1.4rem 0}
  .modes button{min-height:44px;padding:.55rem 1rem;border:1px solid var(--rule);
     border-radius:999px;background:var(--card);color:var(--ink);font-family:var(--sans);
     font-size:.9rem;cursor:pointer}
  .modes button[aria-pressed=true]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .modes button:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

  .status{text-align:center;font-family:var(--mono);font-size:.72rem;
     letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:1rem;min-height:1.2em}

  .board{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
  .col{display:flex;flex-direction:column;gap:.6rem}
  .tile{min-height:64px;padding:.7rem .8rem;border:1px solid var(--rule);border-radius:6px;
     background:var(--card);font-size:.92rem;line-height:1.35;cursor:pointer;text-align:left;
     font-family:var(--sans);color:var(--ink);transition:transform .06s}
  .tile .exp{font-family:var(--serif);font-weight:500;font-size:1.02rem}
  .tile[data-side=es] .exp{color:var(--es)}
  .tile[data-side=it] .exp{color:var(--it)}
  .tile[aria-pressed=true]{border-color:var(--ink);box-shadow:inset 0 0 0 1px var(--ink)}
  .tile:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .tile.ok{background:var(--okbg);border-color:var(--ok);color:var(--ink-2);cursor:default}
  .tile.bad{background:var(--badbg);animation:sh .18s 2}
  @keyframes sh{25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
  @media (prefers-reduced-motion:reduce){.tile.bad{animation:none}}

  .again{display:block;margin:1.4rem auto 0;min-height:48px;padding:.8rem 1.4rem;
     font-family:var(--mono);font-size:.74rem;letter-spacing:.09em;text-transform:uppercase;
     background:var(--ink);color:var(--paper);border:1px solid var(--ink);border-radius:4px;cursor:pointer}
  .again:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
  footer{margin-top:2.5rem;text-align:center;font-family:var(--mono);font-size:.7rem;color:var(--ink-3)}
  footer a{color:inherit}
  @media(max-width:480px){.tile{font-size:.86rem}.tile .exp{font-size:.95rem}}

<div class="wrap">
  <header>
    <p class="eyebrow">Un puente al giorno · practice</p>
    <h1>Match the pairs</h1>
    <p class="sub">Tap one on the left, then its partner on the right. In pair mode you're
    matching counterparts — which, as the frittata will teach you, is not always the same
    as matching meanings.</p>
  </header>

  <div class="modes" role="group" aria-label="Choose what to match">
    <button data-mode="es" aria-pressed="true">Español ↔ meaning</button>

    <div class="col" id="right"></div>
  </div>

  <button class="again" id="again">New round</button>

  <footer><a href="/">← back to today's pair</a></footer>

ts."},{"id":"0038","es":"A ojo de buen cubero","it":"A occhio e croce","esM":"By eyeball estimate; roughly, without measuring.","itM":"Roughly; at a guess; approximately."},{"id":"0039","es":"¡Mucha suerte!","it":"In bocca al lupo","esM":"Good luck — wished directly, no ritual attached.","itM":"Good luck — with a ritual reply: never grazie, always 'crepi (il lupo)'."},{"id":"0040","es":"No ver la hora","it":"Non vedere l'ora","esM":"To be unable to wait; to be dying for something.","itM":"To be unable to wait; to look forward eagerly."},{"id":"0041","es":"Cada muerte de obispo","it":"Ogni morte di papa","esM":"Once in a blue moon; very rarely.","itM":"Once in a blue moon; very rarely."},{"id":"0042","es":"Salir","it":"Salire","esM":"To exit; to leave a place.","itM":"To ascend; to get on a vehicle."},{"id":"0043","es":"Con las manos en la masa","it":"Con le mani nel sacco","esM":"Caught red-handed; in the act.","itM":"Caught red-handed; in the act."},{"id":"0044","es":"Como caído del cielo","it":"Cadere dalle nuvole","esM":"Heaven-sent; arriving exactly when needed (POSITIVE).","itM":"To be stunned by unexpected news; taken completely aback (SURPRISE)."},{"id":"0045","es":"Soltar la sopa","it":"Sputare il rospo","esM":"To spill the beans; to finally talk.","itM":"To come out with it; to finally say the difficult thing."},{"id":"0046","es":"Despacito","it":"Piano piano","esM":"Slowly, gently; easy does it — softened by the diminutive.","itM":"Slowly, gently; little by little; easy does it."},{"id":"0047","es":"Bien, pero no tan bien","it":"Bene ma non benissimo","esM":"Fine, but not great — the deflating follow-up.","itM":"Fine, but not great — ironic understatement; things are slightly off."},{"id":"0048","es":"Quien fue a Sevilla perdió su silla","it":"Chi va a Roma perde la poltrona","esM":"Leave your spot and you forfeit it — the playground law of vacated seats.","itM":"Leave your spot and you forfeit it."},{"id":"0049","es":"Morirse de hambre","it":"Morire di fame","esM":"To be starving (figurative); the reflexive marks the hyperbole.","itM":"To be starving (figurative) — or literally to starve; context decides."},{"id":"0050","es":"Tener dos dedos de frente","it":"Avere sale in zucca","esM":"To have common sense; to show basic good judgment. Usually heard in the negative.","itM":"To have good sense; to be sensible. Usually heard in the negative."},{"id":"0051","es":"Camarón que se duerme se lo lleva la corriente","it":"Chi dorme non piglia pesci","esM":"Snooze and you lose — inattention gets you swept away.","itM":"The sleeper catches nothing — idleness costs you."},{"id":"0052","es":"Más vale pájaro en mano que cien volando","it":"Meglio un uovo oggi che una gallina domani","esM":"Take the certain smaller thing over the uncertain larger one.","itM":"Take the certain smaller thing now over the larger promised later."},{"id":"0053","es":"Hoy por ti, mañana por mí","it":"Oggi a me, domani a te","esM":"I help you now, you help me later — reciprocity between equals.","itM":"What happens to me now will happen to you later — reciprocity, and often a warning."},{"id":"0054","es":"El que no arriesga, no gana","it":"Chi non risica non rosica","esM":"No risk, no reward.","itM":"No risk, no nibble — no reward without daring."},{"id":"0055","es":"Estar en el banquillo","it":"Essere in panchina","esM":"To be a substitute; to be benched.","itM":"To be a substitute; to be benched."},{"id":"0056","es":"Al que madruga, Dios le ayuda","it":"Il mattino ha l'oro in bocca","esM":"The early riser is rewarded.","itM":"The morning hours are the most valuable."},{"id":"0057","es":"A hierro candente, batir de repente","it":"Battere il ferro finché è caldo","esM":"Act while the moment is hot; deal with it now.","itM":"Act while conditions favour you."},{"id":"0058","es":"Entre marido y mujer, nadie se debe meter","it":"Tra moglie e marito non mettere il dito","esM":"Stay out of other people's marriages.","itM":"Do not interfere in a couple's business."},{"id":"0059","es":"Mucho ruido y pocas nueces","it":"Tutto fumo e niente arrosto","esM":"All talk and no substance.","itM":"All show and no substance."},{"id":"0060","es":"Hacer puente","it":"Fare il ponte","esM":"To take the day between a holiday and the weekend off.","itM":"To take the day between a holiday and the weekend off."},{"id":"0061","es":"A lo hecho, pecho","it":"Piangere sul latte versato","esM":"What's done is done — square your shoulders and face it.","itM":"To lament what can no longer be changed (usually in the negative: don't)."},{"id":"0080","es":"Tengo calor","it":"Ho caldo","esM":"I'm hot (temperature).","itM":"I'm hot (temperature)."},{"id":"0090","es":"Hace un frío que pela","it":"Fa un freddo cane","esM":"It's bitterly cold.","itM":"It's bitterly cold."},{"id":"0120","es":"Dar la talla","it":"Essere all'altezza","esM":"To measure up; to be good enough for the occasion.","itM":"To measure up; to be equal to the task."},{"id":"0201","es":"A propósito","it":"a proposito","esM":"By the way; speaking of which.","itM":"By the way; speaking of which."},{"id":"0202","es":"Por lo visto","it":"a quanto pare","esM":"Apparently; so it seems.","itM":"Apparently; so it seems."},{"id":"0203","es":"A decir verdad","it":"a dire il vero","esM":"To tell the truth; honestly.","itM":"To tell the truth; honestly."},{"id":"0204","es":"A la larga","it":"a lungo andare","esM":"In the long run.","itM":"In the long run."},{"id":"0205","es":"A toda costa","it":"a tutti i costi","esM":"At all costs; no matter what.","itM":"At all costs; no matter what."},{"id":"0206","es":"En consecuencia","it":"di conseguenza","esM":"Consequently; as a result.","itM":"Consequently; as a result."},{"id":"0207","es":"Hace poco","it":"di recente","esM":"Recently; a short while ago.","itM":"Recently; a short while ago."},{"id":"0208","es":"Con el tiempo","it":"con il tempo","esM":"Over time; eventually.","itM":"Over time; eventually."},{"id":"0209","es":"Con toda probabilidad","it":"con ogni probabilità","esM":"In all likelihood.","itM":"In all likelihood."},{"id":"0210","es":"Con todo respeto","it":"con tutto il rispetto","esM":"With all due respect.","itM":"With all due respect."},{"id":"0211","es":"Con atención","it":"con attenzione","esM":"Carefully; attentively.","itM":"Carefully; attentively."},{"id":"0212","es":"De algún modo","it":"in qualche modo","esM":"Somehow; in some way.","itM":"Somehow; in some way."},{"id":"0213","es":"En cuanto a","it":"per quanto riguarda","esM":"As far as … is concerned; regarding.","itM":"As far as … is concerned; regarding."},{"id":"0214","es":"Por lo menos","it":"per lo meno","esM":"At least.","itM":"At least."},{"id":"0215","es":"Por mi cuenta","it":"per conto mio","esM":"On my own; by myself; for my part.","itM":"On my own; by myself; for my part."},{"id":"0216","es":"A la fuerza","it":"per forza","esM":"Necessarily; inevitably — or under duress.","itM":"Necessarily; inevitably — or under duress."},{"id":"0217","es":"Para nada","it":"per niente","esM":"Not at all (with negation); at all.","itM":"Not at all (with negation); at all."},{"id":"0218","es":"Por otro lado","it":"dall'altro lato","esM":"On the other hand.","itM":"On the other hand."},{"id":"0219","es":"De ahora en adelante","it":"d'ora in poi","esM":"From now on.","itM":"From now on."},{"id":"0220","es":"A escondidas","it":"di nascosto","esM":"Secretly; on the sly.","itM":"Secretly; on the sly."},{"id":"0221","es":"En persona","it":"di persona","esM":"In person; face to face.","itM":"In person; face to face."},{"id":"0222","es":"De seguro","it":"di sicuro","esM":"Surely; for sure.","itM":"Surely; for sure."},{"id":"0223","es":"En efecto","it":"in effetti","esM":"Actually; indeed; come to think of it.","itM":"Actually; indeed; come to think of it."},{"id":"0224","es":"En todo caso","it":"in ogni caso","esM":"In any case; anyway.","itM":"In any case; anyway."},{"id":"0225","es":"A cambio","it":"in compenso","esM":"To make up for it; on the other hand.","itM":"To make up for it; on the other hand."},{"id":"0226","es":"En promedio","it":"in media","esM":"On average.","itM":"On average."},{"id":"0227","es":"En silencio","it":"in silenzio","esM":"In silence; silently.","itM":"In silence; silently."},{"id":"0228","es":"De prisa","it":"in fretta","esM":"Quickly; in a hurry.","itM":"Quickly; in a hurry."},{"id":"0229","es":"Por casualidad","it":"per caso","esM":"By chance; by any chance.","itM":"By chance; by any chance."},{"id":"0230","es":"Por suerte","it":"per fortuna","esM":"Luckily; fortunately.","itM":"Luckily; fortunately."},{"id":"0231","es":"Solo","it":"da solo","esM":"Alone; by oneself.","itM":"Alone; by oneself."},{"id":"0232","es":"Con calma","it":"con calma","esM":"Calmly; no rush.","itM":"Calmly; no rush."},{"id":"0233","es":"A veces","it":"a volte","esM":"Sometimes.","itM":"Sometimes."},{"id":"0234","es":"De memoria","it":"a memoria","esM":"By heart.","itM":"By heart."},{"id":"0235","es":"En voz alta","it":"a voce alta","esM":"Out loud; aloud.","itM":"Out loud; aloud."},{"id":"0236","es":"Poco a poco","it":"a poco a poco","esM":"Little by little; gradually.","itM":"Little by little; gradually."},{"id":"0237","es":"Al final","it":"alla fine","esM":"In the end; finally.","itM":"In the end; finally."},{"id":"0238","es":"Por lo general","it":"di solito","esM":"Usually; as a rule.","itM":"Usually; as a rule."},{"id":"0239","es":"De nuevo","it":"di nuovo","esM":"Again.","itM":"Again."},{"id":"0240","es":"En realidad","it":"in realtà","esM":"Actually; in fact.","itM":"Actually; in fact."}];
const N = 5;
let mode = "es", matched = 0, sel = { l: null, r: null }, round = [];

const $ = (s) => document.querySelector(s);
const shuffle = (a) => { a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };

function sample() {
  // no two tiles in a round may share display text — ambiguity isn't a puzzle, it's a bug
  const out = [], seen = new Set();
  for (const e of shuffle(DATA)) {
    const texts = mode === "pair" ? [e.es, e.it] : mode === "es" ? [e.es, e.esM] : [e.it, e.itM];
    if (texts.some((t) => seen.has(t))) continue;
    texts.forEach((t) => seen.add(t));
    out.push(e);
    if (out.length === N) break;
  }
  return out;
}

function tile(id, html, side, col) {
  const b = document.createElement("button");
  b.className = "tile"; b.dataset.id = id; b.dataset.col = col;
  if (side) b.dataset.side = side;
  b.setAttribute("aria-pressed", "false");
  b.innerHTML = html;
  b.addEventListener("click", () => pick(b));
  return b;
}

function render() {
  matched = 0; sel = { l: null, r: null };
  round = sample();
  const L = $("#left"), R = $("#right");
  L.innerHTML = ""; R.innerHTML = "";
  const left = shuffle(round), right = shuffle(round);
  for (const e of left) {
    if (mode === "pair") L.appendChild(tile(e.id, '<span class="exp" lang="es">'+e.es+'</span>', "es", "l"));
    else if (mode === "es") L.appendChild(tile(e.id, '<span class="exp" lang="es">'+e.es+'</span>', "es", "l"));
    else L.appendChild(tile(e.id, '<span class="exp" lang="it">'+e.it+'</span>', "it", "l"));
  }
  for (const e of right) {
    if (mode === "pair") R.appendChild(tile(e.id, '<span class="exp" lang="it">'+e.it+'</span>', "it", "r"));
    else R.appendChild(tile(e.id, '<span lang="en">'+(mode === "es" ? e.esM : e.itM)+'</span>', null, "r"));
  }
  say(matched + " of " + N + " matched");
}

function say(t) { $("#status").textContent = t; }

function pick(b) {
  if (b.classList.contains("ok")) return;
  const k = b.dataset.col;
  if (sel[k]) sel[k].setAttribute("aria-pressed", "false");
  sel[k] = b; b.setAttribute("aria-pressed", "true");
  if (sel.l && sel.r) {
    if (sel.l.dataset.id === sel.r.dataset.id) {
      [sel.l, sel.r].forEach((t) => { t.classList.add("ok"); t.setAttribute("aria-pressed","false"); t.disabled = true; });
      matched++;
      say(matched === N ? "All " + N + " matched — nicely done. New round?" : matched + " of " + N + " matched");
    } else {
      [sel.l, sel.r].forEach((t) => { t.classList.add("bad"); t.setAttribute("aria-pressed","false"); });
      setTimeout(() => [sel.l, sel.r].forEach((t) => t && t.classList.remove("bad")), 400);
      say("Not partners — try again");
    }
    sel = { l: null, r: null };
  }
}

document.querySelectorAll(".modes button").forEach((b) =>
  b.addEventListener("click", () => {
    document.querySelectorAll(".modes button").forEach((x) => x.setAttribute("aria-pressed", "false"));
    b.setAttribute("aria-pressed", "true");
    mode = b.dataset.mode;
    render();
  })
);
$("#again").addEventListener("click", render);
render();
</script>
</body>
</html>
