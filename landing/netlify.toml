# Netlify configuration, kept in the repo rather than in a dashboard so the
# deploy settings are versioned like everything else here.
#
# The site is prebuilt: tools/build-landing.mjs and tools/build-match.mjs run
# in GitHub Actions (see .github/workflows/daily-landing.yml) and commit their
# output. Netlify only serves what is already in landing/.

[build]
  publish = "landing"
  command = ""
  # Skip the deploy entirely unless something Netlify actually serves changed.
  # Most commits here touch bank/, tools/ or docs — none of which affect the
  # published site until a generator is re-run and its output committed.
  # Netlify runs this before building: exit 0 = skip the build, non-zero = build.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- landing/"

# 404.html in the publish directory is picked up automatically.

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/cards/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
