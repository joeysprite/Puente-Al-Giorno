name: Rebuild landing page daily
on: {schedule: [{cron: '0 4 * * *'}], workflow_dispatch: {}}
permissions: {contents: write}
jobs: {rebuild: {runs-on: ubuntu-latest, steps: [{uses: actions/checkout@v4}, {uses: actions/setup-node@v4, with: {node-version: '22'}}, {name: Build today from the schedule, run: 'node tools/build-landing.mjs --today --out index.html; node tools/build-match.mjs'}, {name: Commit if changed, run: 'git config user.name daily-bot; git config user.email bot@users.noreply.github.com; git add landing/index.html landing/match.html; git diff --cached --quiet || git commit -m "landing: $(date -u +%F)"; git push'}]}}
