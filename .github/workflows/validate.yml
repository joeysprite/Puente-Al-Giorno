name: Validate idiom bank
on: [push, pull_request]
jobs: {validate: {runs-on: ubuntu-latest, steps: [{uses: actions/checkout@v4}, {uses: actions/setup-node@v4, with: {node-version: '22'}}, {name: Bank schema and composition, run: node tools/validate.mjs bank reviewers.json events.json}, {name: Alternatives layer, run: node tools/validate-alternatives.mjs}, {name: Worklist freshness, run: node tools/build-review-lists.mjs --check}, {name: Scheduler invariants, run: 'Y=$(date +%Y); for y in $Y $((Y+1)) $((Y+2)) $((Y+4)); do node tools/schedule.mjs $y --check; done'}]}}
